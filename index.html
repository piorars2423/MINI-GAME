<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-игры</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #090d16, #111827);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 50px;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 3px;
            padding: 0 20px;
            text-align: center;
            background: linear-gradient(to right, #ffe600, #ff0055, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 15px rgba(255, 230, 0, 0.2));
        }

        .menu-container {
            background: rgba(30, 41, 59, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 28px;
            margin-top: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            max-width: 500px;
            width: 90%;
            box-sizing: border-box;
        }

        /* Элементы выстроены строго в один вертикальный ряд */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
            height: 80px;
            border: 2px solid transparent;
        }

        .btn-pacman {
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            border-color: #3b82f6;
        }
        .btn-pacman:hover {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            transform: translateY(-4px);
        }

        .btn-clicker {
            background: linear-gradient(135deg, #856404, #b58900);
            border-color: #ffe600;
        }
        .btn-clicker:hover {
            background: linear-gradient(135deg, #b58900, #ffe600);
            box-shadow: 0 0 25px rgba(255, 230, 0, 0.5);
            transform: translateY(-4px);
        }

        .btn-snake {
            background: linear-gradient(135deg, #065f46, #047857);
            border-color: #10b981;
        }
        .btn-snake:hover {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.5);
            transform: translateY(-4px);
        }

        .btn-cubes {
            background: linear-gradient(135deg, #9d174d, #be185d);
            border-color: #f43f5e;
        }
        .btn-cubes:hover {
            background: linear-gradient(135deg, #d946ef, #ff0055);
            box-shadow: 0 0 25px rgba(244, 63, 94, 0.6);
            transform: translateY(-4px);
        }

        @media (max-width: 650px) {
            h1 { font-size: 2.2rem; margin-top: 30px; }
            .menu-container { padding: 20px; }
            .menu-btn { font-size: 18px; height: 70px; }
        }
    </style>
</head>
<body>

    <h1>🎮 МИНИ ИГРЫ 🎮</h1>

    <div class="menu-container">
        <div class="menu-grid">
            <a href="pacman.html" class="menu-btn btn-pacman">🕹️ Пакмен</a>
            <a href="clicker.html" class="menu-btn btn-clicker">🖱️ Кликер</a>
            <a href="snake.html" class="menu-btn btn-snake">🐍 Змейка</a>
            <a href="cubes.html" class="menu-btn btn-cubes">🎲 Рулетка Кубов</a> 
        </div>
    </div>

</body>
</html>
