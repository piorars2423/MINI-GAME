<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Pac-Man Progressive Campaign</title>
    <style>
        body {
            background-color: #0b0b16;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #menu, #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #050515;
            padding: 20px;
            border: 4px solid #0000ff;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 255, 0.6);
            width: 90vw;
            max-width: 450px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }
        #game-container { 
            display: none; 
            max-width: 95vw;
        }
        h1 { color: #ffff00; margin: 0 0 25px 0; text-shadow: 3px 3px #000; font-size: 28px; text-align: center; }
        .btn {
            margin: 10px 0;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #0000bb;
            color: white;
            border: 2px solid #ffff00;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.1s;
            text-shadow: 1px 1px black;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover:not(:disabled) { background-color: #0000ff; transform: scale(1.02); }
        .btn:disabled {
            background-color: #222233;
            border-color: #555566;
            color: #777788;
            cursor: not-allowed;
            text-shadow: none;
        }
        #score, #power-timer { font-size: 20px; margin-bottom: 5px; font-weight: bold; color: #ffff00; }
        #power-timer { color: #00ffff; height: 25px; }
          
        canvas { 
            border: 4px solid blue; 
            background-color: black; 
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        }
        #game-over-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            width: 100%;
        }

        /* --- ОБЩИЙ КОНТЕЙНЕР ДЛЯ ВЫСТРАИВАНИЯ КНОПОК В РЯД (ВБОК) --- */
        .buttons-side-layout {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 12px;
            margin: 10px 0;
        }
        .buttons-side-layout .btn {
            margin: 0; 
            flex: 1;   /* Кнопки делят экран поровну */
        }

        .exit-btn {
            background: #ef4444; 
            border: 2px solid #ffffff; 
            color: white;
            font-size: 15px; 
            padding: 12px 20px; 
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .exit-btn:hover { background: #b91c1c; }
          
        .back-menu-btn {
            background: #eab308;
            border: 2px solid #ffffff;
            color: black;
            font-size: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .back-menu-btn:hover { background: #ca8a04; transform: scale(1.05); }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 15px;
        }

        #mobile-controls {
            display: none;
        }
          
        .side-control-block {
            position: fixed;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
          
        #left-side-controls { left: 20px; }
        #right-side-controls { right: 20px; }

        .joy-btn {
            background: rgba(34, 34, 34, 0.8);
            border: 3px solid blue;
            color: #ffff00;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0, 0, 255, 0.5);
        }
        .joy-btn:active { background: blue; color: white; }

        .pacman-global-exit {
            display: block;
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            font-family: monospace;
            color: #ffff00;
            background-color: #00;
            text-decoration: none;
            text-align: center;
            text-transform: uppercase;
            border: 3px solid #0000ff;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 0, 255, 0.5);
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }
        .pacman-global-exit:hover {
            color: #000;
            background-color: #ffff00;
            border-color: #ffff00;
            box-shadow: 0 0 15px #ffff00;
        }

        @media (max-width: 768px) {
            #mobile-controls { display: block; }
            #menu, #game-container { padding: 15px; }
            h1 { font-size: 24px; }
            .btn { padding: 12px 15px; font-size: 15px; }
            
            /* На совсем маленьких экранах кнопки перестроятся вертикально, чтобы текст не влезал на кнопки */
            .buttons-side-layout {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'waka') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'power') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                osc.type = 'square';
                [440, 554, 659, 880].forEach((f, i) => {
                    let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'square';
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                    g.gain.setValueAtTime(0.04, audioCtx.currentTime + i * 0.1);
                    o.start(audioCtx.currentTime + i * 0.1); o.stop(audioCtx.currentTime + i * 0.1 + 0.15);
                });
            } else if (type === 'death') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'eat_ghost') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }

        const pacmanSpeed = 0.05;
        const ghostNormalSpeed = 0.01;
        const ghostFleeSpeed = 0.006;
        const ghostFlySpeed = 0.25;

        class Pacman {
            constructor() {
                this.findSafeSpawn();
                this.x = this.gridX; this.y = this.gridY;
                this.dirX = 0; this.dirY = 0;
                this.nextDirX = 0; this.nextDirY = 0;
                this.angle = 0;
            }

            findSafeSpawn() {
                for (let y = gridHeight - 2; y > 3; y--) {
                    for (let x = 1; x < gridWidth - 1; x++) {
                        if (currentMap[y][x] === 0) { this.gridX = x; this.gridY = y; return; }
                    }
                }
            }

            update() {
                if (this.x === this.gridX && this.y === this.gridY) {
                    if (this.canMove(this.nextDirX, this.nextDirY)) {
                        this.dirX = this.nextDirX; this.dirY = this.nextDirY;
                    }
                    if (this.canMove(this.dirX, this.dirY)) {
                        this.gridX += this.dirX; this.gridY += this.dirY;
                        if (this.gridX < 0) { this.gridX = gridWidth - 1; this.x = gridWidth; }
                        if (this.gridX >= gridWidth) { this.gridX = 0; this.x = -1; }
                    }
                }

                if (this.x !== this.gridX) {
                    let diff = this.gridX - this.x;
                    if (Math.abs(diff) > 5) { this.x = this.gridX; } 
                    else {
                        this.x += Math.sign(diff) * pacmanSpeed;
                        if (Math.abs(this.x - this.gridX) < pacmanSpeed) this.x = this.gridX;
                    }
                }
                if (this.y !== this.gridY) {
                    let diff = this.gridY - this.y;
                    this.y += Math.sign(diff) * pacmanSpeed;
                    if (Math.abs(this.y - this.gridY) < pacmanSpeed) this.y = this.gridY;
                }

                if (this.dirX === 1) this.angle = 0;
                if (this.dirX === -1) this.angle = Math.PI;
                if (this.dirY === 1) this.angle = Math.PI / 2;
                if (this.dirY === -1) this.angle = Math.PI * 1.5;

                let checkX = Math.round(this.x);
                let checkY = Math.round(this.y);
                if (checkX >= 0 && checkX < gridWidth && checkY >= 0 && checkY < gridHeight) {
                    if (currentMap[checkY][checkX] === 0) {
                        currentMap[checkY][checkX] = 2; score += 10; playSound('waka');
                    } else if (currentMap[checkY][checkX] === 3) {
                        currentMap[checkY][checkX] = 2; score += 50; playSound('power'); activatePowerMode();
                    }
                }
            }

            canMove(dx, dy) {
                let targetX = this.gridX + dx; let targetY = this.gridY + dy;
                if (targetX < 0 || targetX >= gridWidth) return true; 
                if (targetY < 0 || targetY >= gridHeight) return false;
                return currentMap[targetY][targetX] !== 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x * tileSize + tileSize / 2, this.y * tileSize + tileSize / 2);
                ctx.rotate(this.angle);
                let mouth = Math.abs(Math.sin(Date.now() / 120)) * 0.35;
                ctx.fillStyle = "#ffff00";
                ctx.beginPath(); ctx.arc(0, 0, tileSize / 2 - 1, mouth, Math.PI * 2 - mouth); ctx.lineTo(0, 0); ctx.fill();
                ctx.fillStyle = "#000000";
                ctx.beginPath(); ctx.arc(1, -5, 2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        class Ghost {
            constructor(gridX, gridY, color) {
                this.startX = gridX; this.startY = gridY;
                this.gridX = gridX; this.gridY = gridY;
                this.x = gridX; this.y = gridY;
                this.color = color;
                this.dirX = 0; this.dirY = -1;
                this.isDead = false;
            }

            update() {
                if (this.isDead) {
                    let dx = this.startX - this.x; let dy = this.startY - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < ghostFlySpeed) {
                        this.x = this.startX; this.y = this.startY;
                        this.gridX = this.startX; this.gridY = this.startY;
                        this.isDead = false;
                    } else {
                        this.x += (dx / dist) * ghostFlySpeed; this.y += (dy / dist) * ghostFlySpeed;
                    }
                    return;
                }

                if (this.x === this.gridX && this.y === this.gridY) {
                    let directions = [];
                    const dirs = [{x:1, y:0}, {x:-1, y:0}, {x:0, y:1}, {x:0, y:-1}];
                    dirs.forEach(d => {
                        if (d.x !== -this.dirX || d.y !== -this.dirY) {
                            let tx = this.gridX + d.x; let ty = this.gridY + d.y;
                            if (tx >= 0 && tx < gridWidth && ty >= 0 && ty < gridHeight) {
                                if (currentMap[ty][tx] !== 1) directions.push(d);
                            }
                        }
                    });
                    if (directions.length === 0) {
                        this.dirX = -this.dirX; this.dirY = -this.dirY;
                    } else {
                        let chosen = directions[Math.floor(Math.random() * directions.length)];
                        this.dirX = chosen.x; this.dirY = chosen.y;
                    }
                    this.gridX += this.dirX; this.gridY += this.dirY;
                }

                let currentSpeed = powerMode ? ghostFleeSpeed : ghostNormalSpeed;
                if (this.x !== this.gridX) {
                    let diff = this.gridX - this.x;
                    this.x += Math.sign(diff) * currentSpeed;
                    if (Math.abs(this.x - this.gridX) < currentSpeed) this.x = this.gridX;
                }
                if (this.y !== this.gridY) {
                    let diff = this.gridY - this.y;
                    this.y += Math.sign(diff) * currentSpeed;
                    if (Math.abs(this.y - this.gridY) < currentSpeed) this.y = this.gridY;
                }
            }

            draw() {
                let px = this.x * tileSize; let py = this.y * tileSize;
                if (this.isDead) {
                    ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                    ctx.beginPath(); ctx.arc(px + 6, py + 10, 3, 0, Math.PI * 2); ctx.arc(px + 14, py + 10, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "blue";
                    ctx.beginPath(); ctx.arc(px + 6, py + 10, 1.5, 0, Math.PI * 2); ctx.arc(px + 14, py + 10, 1.5, 0, Math.PI * 2); ctx.fill();
                    return;
                }

                ctx.fillStyle = powerMode ? (powerTimer < 3000 && Math.floor(Date.now() / 200) % 2 === 0 ? "#ffffff" : "#0000ff") : this.color;
                ctx.beginPath(); ctx.arc(px + tileSize/2, py + tileSize/2 - 2, tileSize/2 - 1, Math.PI, 0, false);
                ctx.lineTo(px + tileSize - 1, py + tileSize);
                let wave = Math.sin((this.x + this.y) * 10) * 2;
                ctx.lineTo(px + tileSize * 0.75, py + tileSize - 3 + wave); ctx.lineTo(px + tileSize * 0.5, py + tileSize);
                ctx.lineTo(px + tileSize * 0.25, py + tileSize - 3 + wave); ctx.lineTo(px + 1, py + tileSize);
                ctx.closePath(); ctx.fill();

                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(px + 6, py + 7, 3, 0, Math.PI * 2); ctx.arc(px + 14, py + 7, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "black";
                ctx.beginPath(); ctx.arc(px + 6 + this.dirX, py + 7 + this.dirY, 1.5, 0, Math.PI * 2); ctx.arc(px + 14 + this.dirX, py + 7 + this.dirY, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        function activatePowerMode() { powerMode = true; powerTimer = 8000; }

        function updateMenuButtons() {
            document.getElementById("btn-lvl2").disabled = maxUnlockedLevel < 2;
            document.getElementById("btn-lvl2").innerHTML = maxUnlockedLevel >= 2 ? "Уровень 2 (Нормально) 🟢" : "Уровень 2 (Нормально) 🔒";
              
            document.getElementById("btn-lvl3").disabled = maxUnlockedLevel < 3;
            document.getElementById("btn-lvl3").innerHTML = maxUnlockedLevel >= 3 ? "Уровень 3 (Сложно) 🟢" : "Уровень 3 (Сложно) 🔒";
        }

        function startGame(lvl) {
            currentLevel = lvl;
            gridWidth = levels[lvl].w;
            gridHeight = levels[lvl].h;
            canvas.width = gridWidth * tileSize;
            canvas.height = gridHeight * tileSize;
            menu.style.display = "none";
            gameContainer.style.display = "flex";
            resetGame();
        }

        function backToMenu() {
            cancelAnimationFrame(animationFrameId);
            gameContainer.style.display = "none";
            menu.style.display = "flex";
            updateMenuButtons();
        }

        function nextLevel() {
            if (currentLevel < 3) {
                startGame(currentLevel + 1);
            }
        }

        function resetGame() {
            currentMap = JSON.parse(JSON.stringify(levels[currentLevel].map));
            score = 0; gameOver = false; gameWon = false; powerMode = false; powerTimer = 0;
            gameOverScreen.style.display = "none";

            pacman = new Pacman();
              
            let sx = levels[currentLevel].spawnX;
            let sy = levels[currentLevel].spawnY;
            const allGhosts = [
                new Ghost(sx, sy, "#ff0000"),
                new Ghost(sx + 1, sy, "#ffb8ff"),
                new Ghost(sx, sy + 1, "#00ffff"),
                new Ghost(sx + 1, sy + 1, "#ffb852")
            ];
              
            ghosts = allGhosts.slice(0, levels[currentLevel].ghostsCount);

            canvas.style.borderColor = levels[currentLevel].wallColor;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            lastTime = performance.now();
            gameLoop();
        }

        window.addEventListener("keydown", e => {
            if (e.code === "KeyW" || e.code === "ArrowUp")    { pacman.nextDirX = 0; pacman.nextDirY = -1; }
            if (e.code === "KeyS" || e.code === "ArrowDown")  { pacman.nextDirX = 0; pacman.nextDirY = 1; }
            if (e.code === "KeyA" || e.code === "ArrowLeft")  { pacman.nextDirX = -1; pacman.nextDirY = 0; }
            if (e.code === "KeyD" || e.code === "ArrowRight") { pacman.nextDirX = 1; pacman.nextDirY = 0; }
        });

        document.getElementById("joy-up").addEventListener("pointerdown", (e) => { pacman.nextDirX = 0; pacman.nextDirY = -1; });
        document.getElementById("joy-down").addEventListener("pointerdown", (e) => { pacman.nextDirX = 0; pacman.nextDirY = 1; });
        document.getElementById("joy-left").addEventListener("pointerdown", (e) => { pacman.nextDirX = -1; pacman.nextDirY = 0; });
        document.getElementById("joy-right").addEventListener("pointerdown", (e) => { pacman.nextDirX = 1; pacman.nextDirY = 0; });

        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        canvas.addEventListener("touchend", e => {
            let diffX = e.changedTouches[0].screenX - touchStartX;
            let diffY = e.changedTouches[0].screenY - touchStartY;
              
            if (Math.max(Math.abs(diffX), Math.abs(diffY)) > 30) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    pacman.nextDirX = diffX > 0 ? 1 : -1;
                    pacman.nextDirY = 0;
                } else {
                    pacman.nextDirX = 0;
                    pacman.nextDirY = diffY > 0 ? 1 : -1;
                }
            }
        }, { passive: true });


        let lastTime = performance.now();
        function gameLoop() {
            let now = performance.now(); let dt = now - lastTime; lastTime = now;
            if (!gameOver && !gameWon) { update(dt); draw(); }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = levels[currentLevel].bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < gridHeight; r++) {
                for (let c = 0; c < gridWidth; c++) {
                    if (currentMap[r][c] === 1) {
                        ctx.fillStyle = levels[currentLevel].wallColor;
                        ctx.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    } else if (currentMap[r][c] === 0) {
                        ctx.fillStyle = levels[currentLevel].dotColor;
                        ctx.beginPath(); ctx.arc(c * tileSize + tileSize / 2, r * tileSize + tileSize / 2, 2.5, 0, Math.PI * 2); ctx.fill();
                    } else if (currentMap[r][c] === 3) {
                        ctx.fillStyle = levels[currentLevel].dotColor;
                        ctx.beginPath(); ctx.arc(c * tileSize + tileSize / 2, r * tileSize + tileSize / 2, 6, 0, Math.PI * 2); ctx.fill();
                    }
                }
            }
            pacman.draw();
            ghosts.forEach(g => g.draw());
            scoreElement.innerText = `Очки: ${score}`;
        }

        function update(dt) {
            pacman.update();

            if (powerMode) {
                powerTimer -= dt;
                if (powerTimer <= 0) { powerMode = false; powerTimer = 0; }
                timerElement.innerText = `Супер-режим: ${Math.ceil(powerTimer / 1000)}с`;
            } else { timerElement.innerText = ""; }

            let dotsLeft = false;

            ghosts.forEach(ghost => {
                ghost.update();
                if (ghost.isDead) return;

                let dist = Math.hypot(pacman.x - ghost.x, pacman.y - ghost.y);
                if (dist < 0.6) { 
                    if (powerMode) {
                        ghost.isDead = true; score += 200; playSound('eat_ghost');
                    } else {
                        gameOver = true; playSound('death');
                        endMessage.innerText = "ИГРА ОКОНЧЕНА";
                        endMessage.style.color = "#ff0000";
                        
                        loseLayout.style.display = "flex";
                        winLayout.style.display = "none";
                        
                        gameOverScreen.style.display = "flex";
                    }
                }
            });

            for (let r = 0; r < gridHeight; r++) {
                for (let c = 0; c < gridWidth; c++) {
                    if (currentMap[r][c] === 0 || currentMap[r][c] === 3) { dotsLeft = true; break; }
                }
            }

            if (!dotsLeft && !gameWon) {
                gameWon = true;
                playSound('win');
                endMessage.innerText = "УРОВЕНЬ ПРОЙДЕН!";
                endMessage.style.color = "#00ff00";
                 
                if (currentLevel === 1 && maxUnlockedLevel < 2) maxUnlockedLevel = 2;
                if (currentLevel === 2 && maxUnlockedLevel < 3) maxUnlockedLevel = 3;

                localStorage.setItem("pacman_max_lvl", maxUnlockedLevel);

                loseLayout.style.display = "none";
                winLayout.style.display = "flex";
                
                gameOverScreen.style.display = "flex";
            }
        }
    </script>
