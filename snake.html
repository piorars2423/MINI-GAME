<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .game-container {
            position: relative;
            max-width: 90vw;
            max-height: 90vw;
            width: 400px;
            height: 400px;
        }

        canvas {
            background: #111827;
            border: 4px solid #3b82f6;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
        }

        /* КРАСИВЫЙ ЭКРАН СМЕРТИ */
        .death-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .death-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .death-title {
            color: #ef4444;
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            animation: pulse 1.5s infinite;
        }

        .death-score {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            transition: all 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.6);
        }

        /* Виртуальный джойстик для телефонов */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 220px;
        }

        .ctrl-btn {
            background: #2563eb;
            border: 1px solid #3b82f6;
            color: white;
            font-size: 26px;
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .ctrl-btn:active {
            background: #3b82f6;
            transform: scale(0.95);
        }

        .back-btn {
            margin-top: 25px;
            background: #ef4444;
            padding: 12px 28px;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (min-width: 651px) { .controls { display: none; } }
        @media (max-width: 650px) { .controls { display: grid; } }
    </style>
</head>
<body>

    <div class="score">Счёт: <span id="score-val">0</span></div>
    
    <div class="game-container">
        <div class="death-screen" id="deathScreen">
            <h2 class="death-title">ИГРА ОКОНЧЕНА</h2>
            <div class="death-score">Вы набрали очков: <span id="final-score">0</span></div>
            <button class="restart-btn" onclick="resetGame()">Играть снова</button>
        </div>

        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>
    
    <div class="controls">
        <div></div>
        <button class="ctrl-btn" onclick="changeDir('up')">▲</button>
        <div></div>
        <button class="ctrl-btn" onclick="changeDir('left')">◀</button>
        <button class="ctrl-btn" onclick="changeDir('down')">▼</button>
        <button class="ctrl-btn" onclick="changeDir('right')">▶</button>
    </div>

    <a href="index.html" class="back-btn">Выйти в меню</a>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const deathScreen = document.getElementById('deathScreen');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {x: 5, y: 5};
        let dx = 1; 
        let dy = 0;
        let score = 0;
        let gameInterval;
        let isGameOver = false;

        function initGame() {
            resetGame();
            gameInterval = setInterval(updateGame, 110);
        }

        function resetGame() {
            // Змейка спавнится сразу с 2 хвостами (3 элемента всего)
            snake = [
                {x: 10, y: 10}, 
                {x: 9, y: 10},  
                {x: 8, y: 10}   
            ];
            dx = 1;
            dy = 0;
            score = 0;
            isGameOver = false;
            document.getElementById('score-val').innerText = score;
            deathScreen.classList.remove('active');
            generateFood();
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) generateFood();
            });
        }

        function updateGame() {
            if (isGameOver) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkCollision(head)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score-val').innerText = score;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function checkCollision(head) {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;
            deathScreen.classList.add('active'); 
        }

        function draw() {
            ctx.fillStyle = '#111827';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Еда
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Змейка
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#10b981' : '#34d399';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // Обработка клавиатуры (поддержка РУС / ENG / СТРЕЛОК)
        window.addEventListener('keydown', e => {
            if (isGameOver) return;
            
            // e.code отслеживает физическую клавишу на клавиатуре независимо от языка!
            switch(e.code) {
                case 'ArrowUp':
                case 'KeyW': 
                    changeDir('up'); 
                    break;
                case 'ArrowDown':
                case 'KeyS': 
                    changeDir('down'); 
                    break;
                case 'ArrowLeft':
                case 'KeyA': 
                    changeDir('left'); 
                    break;
                case 'ArrowRight':
                case 'KeyD': 
                    changeDir('right'); 
                    break;
            }
        });

        function changeDir(direction) {
            if (direction === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (direction === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (direction === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (direction === 'right' && dx === 0) { dx = 1; dy = 0; }
        }

        initGame();
    </script>
</body>
</html>
